#####################################################################
#   Z Stepper Settings
#####################################################################
## Z MCU - MOTOR 2
## Z0 Stepper - Front Left
[stepper_z]
step_pin: PG4
dir_pin: !PC1
enable_pin:  !PA2   #!PA0
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32
endstop_pin: probe:z_virtual_endstop 
#endstop_pin: ^PG10  # motor 2 endstop
##  Z-position of nozzle (in mm) to z-endstop trigger point relative to print surface (Z0)
##  (+) value = endstop above Z0, (-) value = endstop below
##	Increasing position_endstop brings nozzle closer to the bed
##  After you run Z_ENDSTOP_CALIBRATE, position_endstop will be stored at the very end of your config
#position_endstop: 0  #2.250  #1.237   
position_max: 310  #340
position_min: -5
homing_speed: 5.00  #10.0  #8.0
second_homing_speed: 5.0  #4.0
homing_retract_dist: 0  #0 cartographer 4.0 klick P   #4.55
#homing_retract_speed: 5.0

##	Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 stepper_z]
uart_pin: PC7
interpolate: True
run_current: 0.849  #0.8  #1.0 #0.700
hold_current: 0.7
sense_resistor: 0.110
stealthchop_threshold: 99999
driver_TBL: 1
driver_TOFF: 3
driver_HSTRT: 2
driver_HEND: 3
#-----------------------------------------


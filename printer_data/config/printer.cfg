square_corner_velocity: 5.0

#####################################################################
#   X/Y Stepper Settings
#####################################################################

##  B Stepper - Left
##  Connected to MOTOR_0
##  Endstop connected to DIAG_0
[stepper_x]
##	Connected to MOTOR 0  (B Motor)
step_pin: PF13
dir_pin: !PF12
enable_pin: !PF14
rotation_distance: 40
microsteps: 32  #16
full_steps_per_rotation: 200  #set to 400 for 0.9 degree stepper
endstop_pin: ^EBBCan: gpio24  #PB6  # PA1 for X-max
position_min: 0  #3
position_endstop: 350
position_max: 350
homing_speed: 60   #Max 100
second_homing_speed: 10
homing_retract_dist: 7
homing_positive_dir: True

[tmc5160 stepper_x]
cs_pin: PC4
#spi_software_mosi_pin = PA7
#spi_software_miso_pin = PA6
#spi_software_sck_pin = PA5
spi_bus: spi1
interpolate: True
run_current: 1.0  #1.5
hold_current: 0.8
sense_resistor: 0.075
stealthchop_threshold: 0
#diag1_pin: PG6 #I think
#driver_SGT: -64  # -64 is most sensitive value, 63 is least sensitive

##	Make sure to update below for your relevant driver (2208 or 2209)
#[tmc2209 stepper_x]
#uart_pin: PC4
#interpolate: True
#run_current: 0.849  #0.8 #1.0
#hold_current: 0.7 #0.9
#sense_resistor: 0.110
#stealthchop_threshold: 0
#driver_TBL: 3  #1
#driver_TOFF: 4  #3
#driver_HSTRT: 1  #2
#driver_HEND: 12  #3

[stepper_y]
##	Connected to MOTOR 1 (A Motor)
step_pin: PG0
dir_pin: !PG1
enable_pin: !PF15
rotation_distance: 40
microsteps: 32 #16
full_steps_per_rotation: 200  #set to 400 for 0.9 degree stepper
endstop_pin: PG6
position_min: 0
position_endstop: 355
position_max: 355  #352  #351
homing_speed: 60  #Max 100
second_homing_speed: 10
homing_retract_dist: 7
homing_positive_dir: True

##	Make sure to update below for your relevant driver (2208 or 2209)
